apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: auth-service

  template:
    metadata:
      labels:
        app: auth-service

    spec:
      containers:
        - name: auth-service
          image: auth-service:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 3001

          envFrom:
            - configMapRef:
                name: auth-service-config
            - secretRef:
                name: app-secrets